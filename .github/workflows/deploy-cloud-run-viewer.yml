name: Deploy Cloud Run Viewer

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'ucarpac-uapp' }}
      REGION: ${{ vars.GCP_REGION || 'asia-northeast1' }}
      SERVICE: ${{ vars.BIZ_PROTO_SERVICE || 'biz-prototypes-viewer' }}
      BIZ_PROTO_BUCKET: ${{ vars.BIZ_PROTO_BUCKET || 'ucarpac-biz-prototypes-pages' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy viewer
        run: scripts/deploy_cloud_run.sh
