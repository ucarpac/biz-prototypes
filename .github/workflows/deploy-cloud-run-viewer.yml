name: Deploy Cloud Run Viewer

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'ucarpac-uapp' }}
      REGION: ${{ vars.GCP_REGION || 'asia-northeast1' }}
      SERVICE: ${{ vars.BIZ_PROTO_SERVICE || 'biz-prototypes-viewer' }}
      BIZ_PROTO_BUCKET: ${{ vars.BIZ_PROTO_BUCKET || 'ucarpac-biz-prototypes-pages' }}
      CREATE_BUCKET: ${{ vars.BIZ_PROTO_CREATE_BUCKET || '0' }}
      USE_IAP: "1"
      CONFIGURE_IAP_ACCESS: ${{ vars.BIZ_PROTO_CONFIGURE_IAP_ACCESS || '1' }}
      IAP_MEMBERS: ${{ vars.BIZ_PROTO_IAP_MEMBERS || 'domain:ucarpac.co.jp,domain:ayudante.jp' }}
      BIZ_PROTO_GITHUB_TOKEN: ${{ secrets.BIZ_PROTO_GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: ">= 531.0.0"

      - name: Deploy viewer
        run: scripts/deploy_cloud_run.sh
