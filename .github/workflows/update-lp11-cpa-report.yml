name: Update LP11 CPA Report

on:
  schedule:
    - cron: "0 2 * * *" # 11:00 JST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-lp11-cpa-report
  cancel-in-progress: false

jobs:
  update-report:
    runs-on: ubuntu-latest
    env:
      APPSFLYER_TOKEN: ${{ secrets.APPSFLYER_TOKEN }}
      TZ: Asia/Tokyo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: ">= 531.0.0"

      - name: Record LP11 update start
        if: ${{ vars.BIZ_PROTO_BUCKET != '' }}
        env:
          BIZ_PROTO_BUCKET: ${{ vars.BIZ_PROTO_BUCKET }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          status = {
              "status": "running",
              "message": "LP11レポートの自動更新を実行中です。",
              "started_at": datetime.now(timezone.utc).isoformat(),
              "run_url": os.environ["RUN_URL"],
          }
          with open("/tmp/lp11-cpa-report-status.json", "w", encoding="utf-8") as f:
              json.dump(status, f, ensure_ascii=False, indent=2)
              f.write("\n")
          PY
          gcloud storage cp /tmp/lp11-cpa-report-status.json "gs://${BIZ_PROTO_BUCKET}/_status/lp11-cpa-report.json"

      - name: Install dependencies
        run: pip install -r requirements-lp11-report.txt

      - name: Generate LP11 CPA report
        run: python scripts/update_lp11_report.py

      - name: Commit updated LP11 CPA report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/lp11-cpa-report-20260410/index.html
          git diff --cached --quiet || git commit -m "Auto-update LP11 CPA report"
          git push

      - name: Sync updated report to private viewer
        if: ${{ vars.BIZ_PROTO_SYNC_ENABLED == '1' && vars.BIZ_PROTO_BUCKET != '' }}
        env:
          BIZ_PROTO_BUCKET: ${{ vars.BIZ_PROTO_BUCKET }}
        run: scripts/sync_pages_to_gcs.sh

      - name: Record LP11 update success
        if: ${{ success() && vars.BIZ_PROTO_SYNC_ENABLED == '1' && vars.BIZ_PROTO_BUCKET != '' }}
        env:
          BIZ_PROTO_BUCKET: ${{ vars.BIZ_PROTO_BUCKET }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          status = {
              "status": "success",
              "message": "LP11レポートは正常に自動更新され、viewerにも反映済みです。",
              "updated_at": datetime.now(timezone.utc).isoformat(),
              "run_url": os.environ["RUN_URL"],
          }
          with open("/tmp/lp11-cpa-report-status.json", "w", encoding="utf-8") as f:
              json.dump(status, f, ensure_ascii=False, indent=2)
              f.write("\n")
          PY
          gcloud storage cp /tmp/lp11-cpa-report-status.json "gs://${BIZ_PROTO_BUCKET}/_status/lp11-cpa-report.json"

      - name: Record LP11 update failure
        if: ${{ failure() && vars.BIZ_PROTO_BUCKET != '' }}
        env:
          BIZ_PROTO_BUCKET: ${{ vars.BIZ_PROTO_BUCKET }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          status = {
              "status": "failure",
              "message": "LP11レポートの自動更新に失敗しました。実行ログを確認し、必要なら手動更新を実行してください。",
              "updated_at": datetime.now(timezone.utc).isoformat(),
              "run_url": os.environ["RUN_URL"],
          }
          with open("/tmp/lp11-cpa-report-status.json", "w", encoding="utf-8") as f:
              json.dump(status, f, ensure_ascii=False, indent=2)
              f.write("\n")
          PY
          gcloud storage cp /tmp/lp11-cpa-report-status.json "gs://${BIZ_PROTO_BUCKET}/_status/lp11-cpa-report.json"
