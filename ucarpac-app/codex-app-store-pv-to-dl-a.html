<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ストアスクショA - AI査定訴求</title>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #F84CA2;
      --dark-blue: #1c2663;
      --white: #FFFFFF;
      --text-black: #404040;
      --text-gray: #737373;
      --back-white: #FAFAFA;
      --back-gray: #EDF1F4;
      --back-blue: #091355;
      --back-light-pink: #ffd8e8;
      --gradient-primary: linear-gradient(90deg, #1ddcff, #4db4ff);
      --radius-md: 12px;
      --radius-lg: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: 'Noto Sans JP', sans-serif; background: var(--back-white); color: var(--text-black);
    }
    .screen {
      max-width: 420px; margin: 0 auto; padding: 16px; background: #fff;
    }
    .hero {
      background: linear-gradient(180deg, #fff, #fff0f6);
      border-radius: 16px; padding: 18px; position: relative; overflow: hidden;
    }
    .hero .badge {
      display: inline-block; background: var(--pink); color: #fff; font-weight: 700; font-size: 12px;
      padding: 6px 10px; border-radius: 999px; margin-bottom: 10px;
    }
    .hero h1 { font-size: 24px; margin: 0 0 6px; color: var(--dark-blue); }
    .hero p { margin: 0 0 12px; color: var(--text-gray); font-size: 13px; }
    .price {
      font-family: 'Righteous', sans-serif; font-size: 34px; color: var(--pink);
    }
    .card {
      background: #fff; border-radius: 13px; padding: 14px; margin-top: 12px; box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }
    .graph {
      height: 130px; background: linear-gradient(180deg, #ffe5f1, #ffffff);
      border-radius: 12px; position: relative; overflow: hidden; margin-top: 10px;
    }
    .line {
      position: absolute; left: 12px; right: 12px; top: 20px; height: 80px;
      background: linear-gradient(90deg, rgba(248,76,162,0.0), rgba(248,76,162,0.6));
      clip-path: polygon(0 60%, 20% 50%, 40% 45%, 60% 55%, 80% 40%, 100% 30%, 100% 100%, 0 100%);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse { 0%{opacity:.6} 50%{opacity:1} 100%{opacity:.6} }
    .cta {
      margin-top: 14px; display: flex; gap: 8px; align-items: center;
    }
    .btn {
      flex: 1; padding: 12px; border-radius: 30px; font-weight: 700; font-size: 14px;
      border: none; cursor: pointer; transition: transform .2s;
    }
    .btn.primary { background: var(--gradient-primary); color: var(--dark-blue); }
    .btn.pink { background: var(--pink); color: #fff; }
    .btn:hover { transform: translateY(-2px); }
    .chip-row { display: flex; gap: 8px; margin-top: 12px; }
    .chip { padding: 6px 10px; border-radius: 22px; border: 1px solid #f0f0f0; font-size: 12px; }
    .chip.active { background: var(--dark-blue); color: #fff; border-color: var(--dark-blue); }
    .phone0 {
      position: absolute; right: 12px; top: 12px; font-size: 11px; background: #fff; padding: 6px 8px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <script src="../auth.js"></script>
  <!-- このプロトタイプの狙い: AI査定の独自性と将来予測を全面に出し、ストアスクショとして「すぐ価値が伝わる」画面を作る -->
  <div class="screen">
    <div class="hero">
      <div class="phone0">電話0本で相場チェック</div>
      <span class="badge">AI査定で最短30秒</span>
      <h1>あなたの愛車、いくら？</h1>
      <p>個人情報なしで今の相場＋3ヶ月後の予測まで。</p>
      <div class="price">¥1,420,000</div>
      <div style="font-size:12px;color:#8a8a8a;">2020年式 プリウスS / 走行3.2万km</div>
      <div class="graph"><div class="line"></div></div>
      <div class="chip-row">
        <div class="chip active">今月</div>
        <div class="chip">3ヶ月後</div>
        <div class="chip">6ヶ月後</div>
      </div>
      <div class="cta">
        <button class="btn primary">AI査定を始める</button>
        <button class="btn pink">最高額を見る</button>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-weight:700;color:var(--dark-blue);">8,000社が競うオークション</div>
          <div style="font-size:12px;color:#777;">電話は1社のみ、売却はアプリ内で完結</div>
        </div>
        <div style="font-family:'Righteous',sans-serif;color:var(--pink);font-size:20px;">+¥180,000</div>
      </div>
    </div>
  </div>
  <script>
    const chips = document.querySelectorAll('.chip');
    const price = document.querySelector('.price');
    chips.forEach((c, idx) => {
      c.addEventListener('click', () => {
        chips.forEach(x=>x.classList.remove('active'));
        c.classList.add('active');
        const values = ['¥1,420,000','¥1,360,000','¥1,290,000'];
        price.textContent = values[idx];
      });
    });
  </script>
</body>
</html>
