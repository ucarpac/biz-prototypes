<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ストアスクショC - 競合比較「電話0本」</title>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #F84CA2;
      --dark-blue: #1c2663;
      --white: #FFFFFF;
      --text-black: #404040;
      --text-gray: #737373;
      --back-white: #FAFAFA;
      --back-gray: #EDF1F4;
      --gradient-primary: linear-gradient(90deg, #1ddcff, #4db4ff);
    }
    * { box-sizing: border-box; }
    body { margin:0; font-family:'Noto Sans JP', sans-serif; background: var(--back-white); color: var(--text-black); }
    .screen { max-width: 420px; margin: 0 auto; padding: 16px; }
    .hero {
      background: var(--back-blue); color: #fff; border-radius: 16px; padding: 18px; position: relative; overflow: hidden;
    }
    .hero h1 { margin:0 0 6px; font-size: 22px; }
    .hero p { margin:0 0 12px; font-size: 12px; color: #cbd5ff; }
    .ribbon {
      position: absolute; top: 12px; right: -30px; background: var(--pink); color: #fff; font-weight:700; padding: 6px 50px; transform: rotate(20deg); font-size: 12px;
    }
    .compare {
      margin-top: 12px; background:#fff; border-radius: 13px; padding: 12px; box-shadow: 0 8px 18px rgba(0,0,0,0.08);
    }
    .row { display:flex; justify-content:space-between; align-items:center; padding: 8px 0; border-bottom:1px dashed #eee; }
    .row:last-child { border-bottom:none; }
    .pill { padding: 4px 8px; border-radius: 999px; font-size: 11px; background: #f3f4f6; }
    .pill.ok { background: #e6f7ff; color: #1d4ed8; font-weight:700; }
    .pill.bad { background: #ffe5e5; color: #b91c1c; font-weight:700; }
    .cta { margin-top: 12px; display:flex; gap:10px; }
    .cta button { flex:1; padding: 12px; border-radius: 30px; font-weight:700; border:none; cursor:pointer; }
    .cta .primary { background: var(--gradient-primary); color: var(--dark-blue); }
    .cta .pink { background: var(--pink); color: #fff; }
    .toggle {
      display:flex; gap:8px; margin-top: 10px; font-size: 12px;
    }
    .toggle span { padding:6px 10px; border-radius: 999px; border:1px solid #e5e7eb; cursor:pointer; }
    .toggle .active { background: var(--dark-blue); color:#fff; border-color: var(--dark-blue); }
  </style>
</head>
<body>
  <script src="../auth.js"></script>
  <!-- このプロトタイプの狙い: 競合比較を“電話0本”で一発理解させ、安心感からDLを後押しする -->
  <div class="screen">
    <div class="hero">
      <div class="ribbon">電話0本</div>
      <h1>電話ラッシュ、もう終わり。</h1>
      <p>UcarPACは電話1社のみ。しかもAI査定で相場チェックは電話不要。</p>
      <div style="display:flex;gap:8px;align-items:center;">
        <div style="font-family:'Righteous',sans-serif;font-size:28px;color:#fff;">8,000社</div>
        <div style="font-size:12px;color:#cbd5ff;">が競うオークション</div>
      </div>
      <div class="toggle">
        <span class="active">UcarPAC</span>
        <span>MOTA</span>
        <span>ズバット</span>
      </div>
    </div>

    <div class="compare" id="compare">
      <div class="row"><strong>AI査定</strong><span class="pill ok">UcarPACのみ</span></div>
      <div class="row"><strong>電話数</strong><span class="pill ok">0〜1社</span></div>
      <div class="row"><strong>入札数</strong><span class="pill ok">8,000社</span></div>
      <div class="row"><strong>手数料</strong><span class="pill ok">無料</span></div>
    </div>

    <div class="cta">
      <button class="primary">相場を見てみる</button>
      <button class="pink">AI査定を体験</button>
    </div>
  </div>
  <script>
    const options = document.querySelectorAll('.toggle span');
    const compare = document.getElementById('compare');
    const data = {
      'UcarPAC': [
        ['AI査定','UcarPACのみ','ok'],
        ['電話数','0〜1社','ok'],
        ['入札数','8,000社','ok'],
        ['手数料','無料','ok']
      ],
      'MOTA': [
        ['AI査定','なし','bad'],
        ['電話数','最大3社','bad'],
        ['入札数','数百社','bad'],
        ['手数料','無料','ok']
      ],
      'ズバット': [
        ['AI査定','なし','bad'],
        ['電話数','最大10社','bad'],
        ['入札数','比較形式','bad'],
        ['手数料','無料','ok']
      ]
    };
    options.forEach(opt => {
      opt.addEventListener('click', () => {
        options.forEach(o=>o.classList.remove('active'));
        opt.classList.add('active');
        const key = opt.textContent.trim();
        compare.innerHTML = data[key].map(r =>
          `<div class="row"><strong>${r[0]}</strong><span class="pill ${r[2]}">${r[1]}</span></div>`
        ).join('');
      });
    });
  </script>
</body>
</html>
